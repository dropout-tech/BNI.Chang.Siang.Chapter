<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <style>
      .table-title { font-family: 'Noto Sans TC', sans-serif; font-size: 24px; font-weight: 700; fill: #4ca8df; }
      .table-header { font-family: 'Noto Sans TC', sans-serif; font-size: 16px; font-weight: 700; fill: #f4f9ff; }
      .table-cell { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; fill: #e0e8f0; }
      .table-bg { fill: rgba(0, 83, 145, 0.3); stroke: rgba(76, 168, 223, 0.5); stroke-width: 1; }
      .header-bg { fill: rgba(76, 168, 223, 0.4); stroke: rgba(76, 168, 223, 0.6); stroke-width: 1; }
      .row-bg-even { fill: rgba(29, 47, 56, 0.4); }
      .row-bg-odd { fill: rgba(29, 47, 56, 0.2); }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="500" fill="#050505" rx="8"/>
  
  <!-- 標題 -->
  <text x="400" y="40" text-anchor="middle" class="table-title">近期表現 (2025)</text>
  
  <!-- 表格背景 -->
  <rect x="50" y="70" width="700" height="380" class="table-bg" rx="4"/>
  
  <!-- 表頭 -->
  <rect x="50" y="70" width="700" height="50" class="header-bg" rx="4"/>
  <text x="120" y="105" text-anchor="middle" class="table-header">月份</text>
  <text x="280" y="105" text-anchor="middle" class="table-header">引薦單數</text>
  <text x="480" y="105" text-anchor="middle" class="table-header">引薦金額 (TWD)</text>
  <text x="680" y="105" text-anchor="middle" class="table-header">來賓人數</text>
  
  <!-- 分隔線 -->
  <line x1="200" y1="70" x2="200" y2="450" stroke="rgba(76, 168, 223, 0.3)" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="450" stroke="rgba(76, 168, 223, 0.3)" stroke-width="1"/>
  <line x1="600" y1="70" x2="600" y2="450" stroke="rgba(76, 168, 223, 0.3)" stroke-width="1"/>
  
  <!-- 資料列 -->
  <!-- 10月 -->
  <rect x="50" y="120" width="700" height="55" class="row-bg-even"/>
  <text x="120" y="155" text-anchor="middle" class="table-cell">10月</text>
  <text x="280" y="155" text-anchor="middle" class="table-cell">613</text>
  <text x="480" y="155" text-anchor="middle" class="table-cell">11,050,631</text>
  <text x="680" y="155" text-anchor="middle" class="table-cell">16</text>
  
  <!-- 9月 -->
  <rect x="50" y="175" width="700" height="55" class="row-bg-odd"/>
  <text x="120" y="210" text-anchor="middle" class="table-cell">9月</text>
  <text x="280" y="210" text-anchor="middle" class="table-cell">485</text>
  <text x="480" y="210" text-anchor="middle" class="table-cell">2,695,123</text>
  <text x="680" y="210" text-anchor="middle" class="table-cell">10</text>
  
  <!-- 8月 -->
  <rect x="50" y="230" width="700" height="55" class="row-bg-even"/>
  <text x="120" y="265" text-anchor="middle" class="table-cell">8月</text>
  <text x="280" y="265" text-anchor="middle" class="table-cell">515</text>
  <text x="480" y="265" text-anchor="middle" class="table-cell">11,098,799</text>
  <text x="680" y="265" text-anchor="middle" class="table-cell">9</text>
  
  <!-- 7月 -->
  <rect x="50" y="285" width="700" height="55" class="row-bg-odd"/>
  <text x="120" y="320" text-anchor="middle" class="table-cell">7月</text>
  <text x="280" y="320" text-anchor="middle" class="table-cell">590</text>
  <text x="480" y="320" text-anchor="middle" class="table-cell">9,160,680</text>
  <text x="680" y="320" text-anchor="middle" class="table-cell">17</text>
  
  <!-- 6月 -->
  <rect x="50" y="340" width="700" height="55" class="row-bg-even"/>
  <text x="120" y="375" text-anchor="middle" class="table-cell">6月</text>
  <text x="280" y="375" text-anchor="middle" class="table-cell">456</text>
  <text x="480" y="375" text-anchor="middle" class="table-cell">2,144,319</text>
  <text x="680" y="375" text-anchor="middle" class="table-cell">21</text>
  
  <!-- 5月 -->
  <rect x="50" y="395" width="700" height="55" class="row-bg-odd"/>
  <text x="120" y="430" text-anchor="middle" class="table-cell">5月</text>
  <text x="280" y="430" text-anchor="middle" class="table-cell">631</text>
  <text x="480" y="430" text-anchor="middle" class="table-cell">15,606,645</text>
  <text x="680" y="430" text-anchor="middle" class="table-cell">15</text>
  
  <!-- 底部邊框 -->
  <line x1="50" y1="450" x2="750" y2="450" stroke="rgba(76, 168, 223, 0.5)" stroke-width="2"/>
</svg>

